<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg{fill:#ECECE5}
    .ink{fill:#191919}
    .stroke-ink{stroke:#191919}
    @media (prefers-color-scheme: dark){
      .bg{fill:#1A1A1A}
      .ink{fill:#ECECE5}
      .stroke-ink{stroke:#ECECE5}
    }
  </style>
  <rect class="bg" width="64" height="64" rx="12"/>
  <g transform="rotate(-22 32 32)">
    <ellipse class="stroke-ink" cx="32" cy="32" rx="26" ry="8.5" stroke-width="1.6" fill="none" opacity=".4"/>
    <circle class="ink" cx="58" cy="32" r="3.4"/>
  </g>
  <circle class="ink" cx="32" cy="32" r="13" opacity=".12"/>
  <circle class="ink" cx="32" cy="32" r="10.5" opacity=".32"/>
  <circle class="ink" cx="32" cy="32" r="8.2"/>
</svg>
