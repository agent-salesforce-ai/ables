<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .ink{fill:#191919}
    .stroke-ink{stroke:#191919}
    @media (prefers-color-scheme: dark){
      .ink{fill:#ECECE5}
      .stroke-ink{stroke:#ECECE5}
    }
  </style>
  <!-- Tilted orbit ring (back half, drawn first so planet covers center) -->
  <g transform="rotate(-20 32 32)">
    <path class="stroke-ink" d="M 4,32 A 28,8.5 0 0 1 60,32" fill="none" stroke-width="2.2" opacity=".5" stroke-linecap="round"/>
  </g>
  <!-- Planet body with halos -->
  <circle class="ink" cx="32" cy="32" r="13" opacity=".12"/>
  <circle class="ink" cx="32" cy="32" r="10.5" opacity=".32"/>
  <circle class="ink" cx="32" cy="32" r="8.5"/>
  <!-- Front half of ring (crosses in front of planet) -->
  <g transform="rotate(-20 32 32)">
    <path class="stroke-ink" d="M 4,32 A 28,8.5 0 0 0 60,32" fill="none" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Satellite on the front arc -->
    <circle class="ink" cx="59.5" cy="32" r="2.6"/>
  </g>
</svg>
